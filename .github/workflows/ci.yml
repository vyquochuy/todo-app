name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Shared package ──────────────────────────────────────────
  shared:
    name: Shared Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Type-check shared
        run: npm run type-check --workspace=packages/shared

  # ── Backend ─────────────────────────────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest
    needs: shared
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Lint
        run: npm run lint --workspace=backend
      - name: Type-check
        run: npm run type-check --workspace=backend
      - name: Test
        run: npm run test --workspace=backend

  # ── Frontend ─────────────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: shared
    env:
      NEXT_PUBLIC_API_URL: http://localhost:8787
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Lint
        run: npm run lint --workspace=frontend
      - name: Type-check
        run: npm run type-check --workspace=frontend
      - name: Test
        run: npm run test --workspace=frontend
